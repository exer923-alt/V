<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Cumpleaños Karen</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,Helvetica,sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#f8d7ff,#d7e9ff,#fff0f7);
background-size:400% 400%;
animation:bg 12s ease infinite;
overflow:hidden;
}
@keyframes bg{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.card{
backdrop-filter:blur(10px);
background:rgba(255,255,255,.45);
padding:40px;
border-radius:28px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
max-width:700px;
width:90%;
text-align:center;
}
h1{font-size:3rem;color:#fff;text-shadow:0 3px 10px rgba(0,0,0,.2);margin-bottom:15px}
p{font-size:1.25rem;color:#fff;line-height:1.7;text-shadow:0 2px 8px rgba(0,0,0,.18)}
.small{margin-top:20px;font-size:1rem;opacity:.95}
button{
margin-top:25px;border:none;padding:14px 22px;border-radius:999px;
background:#fff;color:#8c5cff;font-weight:bold;font-size:1rem;cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,.12)
}
button:hover{transform:scale(1.05)}
.heart{position:absolute;color:white;animation:float 8s linear infinite;opacity:.7}
@keyframes float{0%{transform:translateY(100vh) scale(.8)}100%{transform:translateY(-10vh) scale(1.4)}}
</style>
</head>
<body>
<div class="card">
<h1>🎉 Feliz cumpleaños Karen 🎂</h1>
<p>Que la pases increíble hoy y que se cumplan todos tus sueños ✨</p>
<p class="small">Hoy es tu día especial y mereces sonreír muchísimo 💖</p>
<button onclick="alert('Karen, eres una persona increíble ✨')">Sorpresa</button>
</div>
<script>
for(let i=0;i<25;i++){
 const h=document.createElement('div');
 h.className='heart';
 h.innerHTML=['✨','💖','⭐','🌸'][Math.floor(Math.random()*4)];
 h.style.left=Math.random()*100+'vw';
 h.style.fontSize=(18+Math.random()*22)+'px';
 h.style.animationDuration=(5+Math.random()*6)+'s';
 h.style.animationDelay=(Math.random()*5)+'s';
 document.body.appendChild(h);
}
</script>
</body>
</html>
